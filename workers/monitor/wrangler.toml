name = "unratified-monitor"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[triggers]
crons = [
  "*/5 * * * *",
  "0 * * * *",
  "0 */6 * * *",
  "0 6 * * *",
]

[[d1_databases]]
binding = "DB"
database_name = "unratified-monitor"
database_id = "FILL_AFTER_CREATION"

[vars]
ALERT_EMAIL = "kashif@kashifshah.net"
FROM_EMAIL = "monitor@kashifshah.net"
